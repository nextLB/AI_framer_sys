{% extends 'ai_recognition/inference.html' %}

{% block inference_content %}
<div class="card">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0"><i class="bi bi-webcam"></i> 实时摄像头检测</h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-3">
                <div class="mb-3">
                    <label class="form-label">选择AI模型</label>
                    <select id="modelSelect" class="form-select">
                        <option value="">默认模型</option>
                        {% for model in models %}
                        <option value="{{ model.id }}">{{ model.name }} ({{ model.model_type }})</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">置信度阈值</label>
                    <input type="range" class="form-range" id="confidenceRange" min="0" max="1" step="0.05" value="0.25">
                    <div class="d-flex justify-content-between">
                        <small>0</small>
                        <span id="confidenceValue">0.25</span>
                        <small>1</small>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">摄像头选择</label>
                    <select id="cameraSelect" class="form-select">
                        <option value="0">摄像头 0</option>
                        <option value="1">摄像头 1</option>
                        <option value="2">摄像头 2</option>
                    </select>
                </div>
                
                <div class="d-grid gap-2">
                    <button id="startBtn" class="btn btn-success btn-lg" onclick="startCamera()">
                        <i class="bi bi-play-fill"></i> 开启检测
                    </button>
                    <button id="stopBtn" class="btn btn-danger btn-lg" onclick="stopCamera()" disabled>
                        <i class="bi bi-stop-fill"></i> 停止检测
                    </button>
                </div>
                
                <div class="mt-3">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6 class="card-title"><i class="bi bi-bar-chart"></i> 检测统计</h6>
                            <table class="table table-sm">
                                <tr>
                                    <td>检测数量</td>
                                    <td id="totalCount">0</td>
                                </tr>
                                <tr>
                                    <td>FPS</td>
                                    <td id="fpsCount">0</td>
                                </tr>
                                <tr>
                                    <td>运行时间</td>
                                    <td id="runTime">00:00</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                <div class="position-relative">
                    <video id="videoElement" autoplay playsinline style="width: 100%; border-radius: 8px; background: #000;"></video>
                    <canvas id="canvasElement" style="position: absolute; top: 0; left: 0; width: 100%; border-radius: 8px;"></canvas>
                </div>
                
                <div class="mt-3">
                    <div class="card">
                        <div class="card-header">
                            <h6 class="mb-0"><i class="bi bi-list-ul"></i> 检测结果列表</h6>
                        </div>
                        <div class="card-body" style="max-height: 200px; overflow-y: auto;">
                            <table class="table table-sm table-hover">
                                <thead>
                                    <tr>
                                        <th>类别</th>
                                        <th>置信度</th>
                                        <th>时间</th>
                                    </tr>
                                </thead>
                                <tbody id="detectionTable">
                                    <tr>
                                        <td colspan="3" class="text-center text-muted">暂无检测结果</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let video = document.getElementById('videoElement');
let canvas = document.getElementById('canvasElement');
let ctx = canvas.getContext('2d');
let stream = null;
let isRunning = false;
let frameCount = 0;
let lastTime = Date.now();
let runStartTime = null;
let runTimer = null;
let lastDetections = [];

async function loadCameras() {
    try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');
        const cameraSelect = document.getElementById('cameraSelect');
        cameraSelect.innerHTML = '';
        
        if (videoDevices.length === 0) {
            cameraSelect.innerHTML = '<option value="">无可用摄像头</option>';
            return;
        }
        
        videoDevices.forEach((device, index) => {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.text = device.label || `摄像头 ${index + 1}`;
            cameraSelect.appendChild(option);
        });
    } catch (err) {
        console.error('获取摄像头列表失败:', err);
    }
}

loadCameras();

document.getElementById('confidenceRange').addEventListener('input', function(e) {
    document.getElementById('confidenceValue').textContent = e.target.value;
});

async function startCamera() {
    const cameraSelect = document.getElementById('cameraSelect');
    const cameraId = cameraSelect.value;
    
    try {
        const constraints = {
            video: {
                deviceId: cameraId ? { exact: cameraId } : undefined,
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        };
        
        isRunning = true;
        runStartTime = Date.now();
        lastTime = Date.now();
        frameCount = 0;
        
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        
        runTimer = setInterval(updateTimer, 1000);
        detectLoop();
        
    } catch (err) {
        alert('无法访问摄像头: ' + err.message);
    }
}

function stopCamera() {
    isRunning = false;
    
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    
    if (runTimer) {
        clearInterval(runTimer);
        runTimer = null;
    }
}

async function detectLoop() {
    if (!isRunning) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const modelId = document.getElementById('modelSelect').value;
    const confidence = document.getElementById('confidenceRange').value;
    
    const canvas_img = document.createElement('canvas');
    canvas_img.width = video.videoWidth;
    canvas_img.height = video.videoHeight;
    const tempCtx = canvas_img.getContext('2d');
    tempCtx.drawImage(video, 0, 0);
    const imageData = canvas_img.toDataURL('image/jpeg', 0.8);
    
    try {
        const response = await fetch('/ai/inference/camera/detect/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: `model_id=${modelId}&confidence=${confidence}&image_data=${encodeURIComponent(imageData)}`
        });
        
        const data = await response.json();
        
        if (data.success && data.detections) {
            lastDetections = data.detections;
            drawDetections(data.detections);
            updateDetectionTable(data.detections);
            document.getElementById('totalCount').textContent = data.detections.length;
        }
        
    } catch (err) {
        console.error('Detection error:', err);
    }
    
    frameCount++;
    const now = Date.now();
    if (now - lastTime >= 1000) {
        document.getElementById('fpsCount').textContent = frameCount;
        frameCount = 0;
        lastTime = now;
    }
    
    setTimeout(detectLoop, 100);
}

function drawDetections(detections) {
    const colors = ['#00ff00', '#ff0000', '#ffff00', '#00ffff', '#ff00ff', '#ffa500'];
    
    detections.forEach((det, idx) => {
        const [x1, y1, x2, y2] = det.bbox;
        const color = colors[idx % colors.length];
        
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        
        ctx.fillStyle = color;
        ctx.fillRect(x1, y1 - 25, 150, 25);
        
        ctx.fillStyle = '#000';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(`${det.class_name}: ${(det.confidence * 100).toFixed(1)}%`, x1 + 5, y1 - 7);
    });
}

function updateDetectionTable(detections) {
    const tbody = document.getElementById('detectionTable');
    
    if (detections.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">暂无检测结果</td></tr>';
        return;
    }
    
    const time = new Date().toLocaleTimeString();
    let html = '';
    
    detections.slice(-10).reverse().forEach(det => {
        html += `<tr>
            <td><span class="badge bg-primary">${det.class_name}</span></td>
            <td>${(det.confidence * 100).toFixed(1)}%</td>
            <td><small>${time}</small></td>
        </tr>`;
    });
    
    tbody.innerHTML = html;
}

function updateTimer() {
    if (!runStartTime) return;
    
    const elapsed = Math.floor((Date.now() - runStartTime) / 1000);
    const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const seconds = (elapsed % 60).toString().padStart(2, '0');
    document.getElementById('runTime').textContent = `${minutes}:${seconds}`;
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
