{% extends 'base.html' %}

{% block title %}AI推理检测{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4"><i class="bi bi-search"></i> AI推理检测</h2>
        
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="{% url 'ai_recognition:inference_image' %}" class="list-group-item list-group-item-action {% if request.path == '/ai/inference/image/' %}active{% endif %}">
                        <i class="bi bi-image"></i> 图片检测
                    </a>
                    <a href="{% url 'ai_recognition:inference_video' %}" class="list-group-item list-group-item-action {% if request.path == '/ai/inference/video/' %}active{% endif %}">
                        <i class="bi bi-film"></i> 视频检测
                    </a>
                    <a href="{% url 'ai_recognition:inference_camera' %}" class="list-group-item list-group-item-action {% if request.path == '/ai/inference/camera/' %}active{% endif %}">
                        <i class="bi bi-webcam"></i> 实时摄像头
                    </a>
                    <a href="{% url 'ai_recognition:inference_history' %}" class="list-group-item list-group-item-action {% if request.path == '/ai/inference/history/' %}active{% endif %}">
                        <i class="bi bi-clock-history"></i> 历史记录
                    </a>
                </div>
                
                <div class="card mt-4">
                    <div class="card-header bg-info text-white">
                        <h6 class="mb-0"><i class="bi bi-info-circle"></i> 使用说明</h6>
                    </div>
                    <div class="card-body">
                        <p class="small">1. 选择已训练的AI模型</p>
                        <p class="small">2. 设置置信度阈值</p>
                        <p class="small">3. 上传图片/视频或开启摄像头</p>
                        <p class="small">4. 查看检测结果和可视化</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-9">
                {% block inference_content %}
                <div class="card">
                    <div class="card-body text-center py-5">
                        <i class="bi bi-cpu" style="font-size: 4rem; color: #6c757d;"></i>
                        <h4 class="mt-3 text-muted">选择检测模式</h4>
                        <p class="text-muted">请从左侧菜单选择图片检测、视频检测或实时摄像头</p>
                    </div>
                </div>
                {% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
