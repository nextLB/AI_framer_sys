{% extends 'base.html' %}

{% block title %}上传模型{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-upload"></i> 上传AI模型</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">模型名称</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">模型架构</label>
                        <select name="model_type" class="form-select" required>
                            <option value="yolov8n">YOLOv8 Nano</option>
                            <option value="yolov8s">YOLOv8 Small</option>
                            <option value="yolov8m">YOLOv8 Medium</option>
                            <option value="yolov8l">YOLOv8 Large</option>
                            <option value="yolov8x">YOLOv8 XLarge</option>
                            <option value="yolo11n">YOLO11 Nano</option>
                            <option value="yolo11s">YOLO11 Small</option>
                            <option value="yolo11m">YOLO11 Medium</option>
                            <option value="yolo11l">YOLO11 Large</option>
                            <option value="yolo11x">YOLO11 XLarge</option>
                            <option value="custom">自定义模型</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">模型文件</label>
                        <input type="file" name="model_file" class="form-control" accept=".pt,.pth">
                        <small class="text-muted">支持 .pt, .pth 格式文件</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">模型路径 (替代文件上传)</label>
                        <input type="text" name="model_path" class="form-control" placeholder="/path/to/model.pt">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">类别数量</label>
                        <input type="number" name="num_classes" class="form-control" value="0">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">类别名称 (JSON数组)</label>
                        <textarea name="class_names" class="form-control" rows="3" placeholder='["class1", "class2", "class3"]'></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">模型描述</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-upload"></i> 上传模型
                        </button>
                        <a href="{% url 'ai_recognition:model_list' %}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
